<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>FixPlan Prototype</title>
  <meta name="description" content="Klickbarer FixPlan Prototyp mit Projektfunktionen, Nutzerfunktionen und persönlichem Workspace." />
  <style>
:root {
  --brand: #0f87b5;
  --brand-dark: #08749f;
  --brand-soft: #e9f6fb;
  --accent: #79b6ee;
  --accent-soft: #d8ebff;
  --bg: #f4f7fb;
  --surface: #ffffff;
  --surface-2: #f8fafc;
  --line: #d7dde7;
  --line-dark: #aeb8c6;
  --text: #27313f;
  --muted: #6d7682;
  --shadow: 0 18px 48px rgba(21, 34, 50, 0.12);
  --shadow-soft: 0 8px 22px rgba(21, 34, 50, 0.08);
  --radius-xl: 28px;
  --radius-lg: 20px;
  --radius-md: 14px;
  --sidebar-width: 272px;
  --topbar-height: 92px;
  --font: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
}

* {
  box-sizing: border-box;
}

html,
body {
  height: 100%;
  margin: 0;
}

body {
  min-width: 1180px;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font);
}

button,
input,
textarea {
  font: inherit;
}

button {
  cursor: pointer;
}

.app-shell {
  min-height: 100vh;
  display: grid;
  grid-template-columns: var(--sidebar-width) 1fr;
}

.sidebar {
  position: sticky;
  top: 0;
  height: 100vh;
  padding: 26px 20px;
  background: linear-gradient(180deg, var(--brand), var(--brand-dark));
  color: #fff;
  box-shadow: 8px 0 30px rgba(10, 108, 149, 0.18);
}

.project-switcher {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  margin-bottom: 24px;
  padding: 2px 4px 20px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.18);
}

.project-title {
  font-size: 27px;
  font-weight: 700;
  letter-spacing: 0.2px;
}

.project-toggle {
  width: 38px;
  height: 38px;
  display: grid;
  place-items: center;
  border: 1px solid rgba(255, 255, 255, 0.25);
  border-radius: 12px;
  background: rgba(255, 255, 255, 0.12);
  color: #fff;
  font-size: 20px;
}

.nav-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.nav-item {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 12px;
  border: 0;
  border-radius: 18px;
  padding: 14px 16px;
  background: transparent;
  color: rgba(255, 255, 255, 0.88);
  text-align: left;
  font-size: 20px;
  font-weight: 500;
  transition: 160ms ease;
}

.nav-item:hover,
.nav-item.is-active {
  background: rgba(255, 255, 255, 0.16);
  color: #fff;
  transform: translateX(3px);
}

.nav-icon {
  width: 24px;
  height: 24px;
  display: grid;
  place-items: center;
  opacity: 0.94;
}

.nav-label {
  display: inline-block;
  line-height: 1.15;
  white-space: normal;
}

.nav-item.is-multiline {
  align-items: flex-start;
  padding-top: 12px;
  padding-bottom: 12px;
}

.nav-item.is-multiline .nav-icon {
  margin-top: 2px;
}

.nav-item.is-multiline .nav-label {
  font-size: 18px;
  line-height: 1.12;
}


.sidebar-context-label {
  margin: -8px 4px 14px;
  color: rgba(255, 255, 255, 0.72);
  font-size: 12px;
  font-weight: 800;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}

.user-switcher {
  margin-bottom: 24px;
  padding: 2px 4px 20px;
  border-bottom: 1px solid rgba(255, 255, 255, 0.18);
}

.user-name {
  font-size: 24px;
  line-height: 1.12;
  font-weight: 800;
  letter-spacing: 0.1px;
}

.user-subtitle {
  margin-top: 7px;
  color: rgba(255, 255, 255, 0.75);
  font-size: 13px;
  font-weight: 650;
}

.main-area {
  min-width: 0;
  display: grid;
  grid-template-rows: var(--topbar-height) 1fr;
}

.topbar {
  position: sticky;
  top: 0;
  z-index: 20;
  height: var(--topbar-height);
  display: grid;
  grid-template-columns: minmax(180px, 1fr) auto minmax(390px, 1fr);
  align-items: center;
  gap: 24px;
  padding: 14px 36px;
  background: rgba(255, 255, 255, 0.94);
  border-bottom: 1px solid var(--line);
  backdrop-filter: blur(16px);
}

.topbar-brand {
  justify-self: start;
  display: inline-flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
  color: var(--text);
  font-weight: 900;
  letter-spacing: 0.1px;
}

.brand-mark {
  width: 42px;
  height: 42px;
  display: grid;
  place-items: center;
  border-radius: 14px;
  background: var(--brand);
  color: #fff;
  box-shadow: var(--shadow-soft);
}

.brand-word {
  font-size: 20px;
}

.topbar-center {
  justify-self: center;
  display: grid;
  grid-template-columns: 136px 150px 58px 136px 136px;
  align-items: center;
  gap: 10px;
}

.top-action-tile {
  height: 46px;
  border: 1px solid var(--line);
  border-radius: 16px;
  background: #fff;
  color: var(--text);
  font-weight: 800;
  box-shadow: 0 6px 18px rgba(21, 34, 50, 0.06);
  transition: 160ms ease;
}

.top-action-tile:hover:not(.is-empty),
.top-action-tile.is-active {
  border-color: rgba(15, 135, 181, 0.35);
  background: var(--brand-soft);
  color: var(--brand-dark);
  transform: translateY(-1px);
}

.top-action-tile.is-empty {
  background: var(--surface-2);
  color: transparent;
  cursor: default;
  opacity: 0.72;
  box-shadow: none;
}

.quick-create {
  width: 58px;
  height: 58px;
  display: grid;
  place-items: center;
  border: 0;
  border-radius: 20px;
  background: var(--text);
  color: #fff;
  font-size: 36px;
  line-height: 1;
  box-shadow: var(--shadow-soft);
  transition: 160ms ease;
}

.quick-create:hover {
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}

.topbar-user-actions {
  justify-self: end;
  display: inline-flex;
  align-items: center;
  gap: 12px;
  min-width: 0;
}

.top-tabs {
  display: inline-flex;
  gap: 6px;
  padding: 5px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: var(--surface-2);
}

.top-tab {
  border: 0;
  border-radius: 13px;
  padding: 10px 16px;
  background: transparent;
  color: var(--muted);
  font-weight: 650;
  white-space: nowrap;
  transition: 160ms ease;
}

.top-tab:hover,
.top-tab.is-active {
  background: #fff;
  color: var(--text);
  box-shadow: 0 5px 16px rgba(21, 34, 50, 0.08);
}

.user-button {
  width: 46px;
  height: 46px;
  display: grid;
  place-items: center;
  border: 1px solid var(--line);
  border-radius: 16px;
  background: #fff;
  color: var(--brand);
  font-weight: 800;
}

.user-button.is-active {
  border-color: rgba(15, 135, 181, 0.35);
  background: var(--brand-soft);
  color: var(--brand-dark);
}

.content {
  padding: 34px 36px 42px;
}

.view-header {
  display: flex;
  align-items: end;
  justify-content: space-between;
  gap: 24px;
  margin-bottom: 24px;
}

.title-block h1 {
  margin: 0;
  color: #5b6068;
  font-size: 42px;
  line-height: 1.05;
  font-weight: 700;
}

.title-block p {
  margin: 10px 0 0;
  color: var(--muted);
  font-size: 16px;
}

.segmented {
  display: inline-flex;
  gap: 6px;
  padding: 5px;
  border: 1px solid var(--line);
  border-radius: 16px;
  background: var(--surface);
  box-shadow: var(--shadow-soft);
}

.segmented button {
  min-width: 126px;
  border: 0;
  border-radius: 12px;
  padding: 10px 18px;
  background: transparent;
  color: var(--muted);
  font-weight: 700;
  transition: 160ms ease;
}

.segmented button:hover,
.segmented button.is-active {
  background: var(--text);
  color: #fff;
}

.date-switcher,
.calendar-tools {
  display: flex;
  align-items: center;
  gap: 12px;
}

.date-chip {
  min-width: 92px;
  padding: 9px 14px;
  border-radius: 16px;
  background: var(--surface);
  border: 1px solid var(--line);
  color: var(--muted);
  text-align: center;
  font-weight: 700;
  box-shadow: var(--shadow-soft);
}

.icon-button {
  width: 42px;
  height: 42px;
  display: grid;
  place-items: center;
  border: 1px solid var(--line);
  border-radius: 14px;
  background: #fff;
  color: var(--text);
  font-size: 22px;
  transition: 160ms ease;
}

.icon-button:hover {
  border-color: var(--brand);
  color: var(--brand);
  transform: translateY(-1px);
}

.timelog-grid {
  display: grid;
  grid-template-columns: 330px minmax(740px, 1fr);
  gap: 20px;
  align-items: stretch;
}

.summary-panel,
.timeline-panel,
.calendar-panel,
.sheet-panel {
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: var(--radius-xl);
  background: var(--surface);
  box-shadow: var(--shadow-soft);
}

.summary-panel {
  padding: 24px;
}

.donut-card {
  display: grid;
  place-items: center;
  min-height: 240px;
  border-radius: 22px;
  background: linear-gradient(180deg, #fff, var(--surface-2));
  border: 1px solid var(--line);
}

.donut {
  position: relative;
  width: 186px;
  height: 186px;
  border-radius: 50%;
  background: conic-gradient(var(--brand) 0 65%, var(--accent-soft) 65% 100%);
  box-shadow: inset 0 0 0 1px rgba(17, 24, 39, 0.05);
}

.donut::after {
  content: "";
  position: absolute;
  inset: 34px;
  border-radius: 50%;
  background: #fff;
  box-shadow: inset 0 0 0 1px var(--line);
}

.donut-label {
  position: absolute;
  inset: 0;
  z-index: 2;
  display: grid;
  place-items: center;
  color: var(--muted);
  text-align: center;
  font-weight: 800;
}

.donut-label span:first-child {
  display: block;
  color: var(--text);
  font-size: 32px;
}

.donut-label span:last-child {
  display: block;
  margin-top: 5px;
  font-size: 18px;
}

.task-list {
  margin-top: 20px;
  display: grid;
  gap: 12px;
}

.task-summary-row {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 14px;
  align-items: center;
  padding: 16px 18px;
  border: 1px solid var(--line);
  border-radius: 18px;
  background: #fff;
}

.task-summary-row strong {
  font-size: 16px;
  color: var(--text);
}

.task-summary-row span {
  font-size: 22px;
  font-weight: 800;
  color: var(--muted);
}

.timeline-panel {
  display: grid;
  grid-template-columns: 76px 1fr;
  min-height: 670px;
}

.timeline-hours {
  position: relative;
  border-right: 1px solid var(--line);
  background: var(--surface-2);
}

.hour-label {
  position: absolute;
  right: 14px;
  translate: 0 -50%;
  color: var(--muted);
  font-size: 19px;
  font-weight: 650;
}

.timeline-canvas {
  position: relative;
  min-height: 670px;
  background:
    linear-gradient(to bottom, transparent calc(100% - 1px), var(--line) calc(100% - 1px)),
    repeating-linear-gradient(to bottom, #fff 0, #fff 55px, #f8fafc 55px, #f8fafc 56px);
  background-size: 100% 56px, 100% 56px;
}

.time-entry {
  position: absolute;
  left: 20px;
  right: 20px;
  min-height: 42px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 0 18px;
  border: 1px solid rgba(43, 122, 191, 0.32);
  border-radius: 18px;
  background: linear-gradient(180deg, #acd1f4, #90bee9);
  color: #39546c;
  box-shadow: 0 10px 22px rgba(68, 132, 192, 0.18);
}

.time-entry-title {
  font-size: 18px;
  font-weight: 750;
}

.time-entry-time {
  display: flex;
  align-items: center;
  gap: 8px;
  color: rgba(39, 49, 63, 0.7);
  font-weight: 800;
}

.time-entry-handle {
  width: 42px;
  height: 20px;
  border-radius: 99px;
  background: rgba(255, 255, 255, 0.44);
  border: 1px solid rgba(255, 255, 255, 0.7);
  position: relative;
}

.time-entry-handle::before,
.time-entry-handle::after {
  content: "";
  position: absolute;
  left: 9px;
  right: 9px;
  height: 2px;
  background: rgba(39, 49, 63, 0.45);
  border-radius: 2px;
}

.time-entry-handle::before { top: 6px; }
.time-entry-handle::after { top: 11px; }

.timeline-add {
  position: absolute;
  left: 50%;
  top: 188px;
  translate: -50% 0;
  width: 160px;
  height: 58px;
  display: grid;
  place-items: center;
  border: 2px dashed var(--line-dark);
  border-radius: 20px;
  background: rgba(255, 255, 255, 0.82);
  color: var(--muted);
  font-size: 34px;
  transition: 160ms ease;
}

.timeline-add:hover {
  border-color: var(--brand);
  color: var(--brand);
  transform: translateY(-2px);
}

.calendar-panel {
  padding: 0;
}

.calendar-grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(125px, 1fr));
  border-top: 1px solid var(--line);
  border-left: 1px solid var(--line);
}

.weekday,
.calendar-day {
  border-right: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}

.weekday {
  height: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  background: var(--surface-2);
  color: var(--muted);
  font-size: 17px;
  font-weight: 800;
}

.calendar-day {
  min-height: 132px;
  padding: 12px;
  background: #fff;
  transition: 160ms ease;
}

.calendar-day:hover {
  background: #fbfdff;
}

.calendar-day.is-muted {
  color: #a0a8b3;
  background: #fafbfc;
}

.calendar-day.is-today {
  box-shadow: inset 0 0 0 2px rgba(15, 135, 181, 0.3);
}

.day-number {
  display: flex;
  justify-content: flex-end;
  color: var(--muted);
  font-size: 18px;
  font-weight: 750;
}

.calendar-entry {
  margin-top: 8px;
  padding: 8px 10px;
  border-radius: 12px;
  background: var(--brand-soft);
  color: var(--brand-dark);
  font-size: 13px;
  font-weight: 750;
  border: 1px solid rgba(15, 135, 181, 0.14);
}

.calendar-add-line {
  width: 100%;
  margin-top: 8px;
  padding: 6px 8px;
  border: 1px dashed var(--line-dark);
  border-radius: 10px;
  background: #fff;
  color: var(--muted);
  font-weight: 800;
}

.sheet-panel {
  padding: 24px;
}

.sheet-cards {
  display: grid;
  grid-template-columns: repeat(3, minmax(180px, 1fr));
  gap: 16px;
  margin-bottom: 22px;
}

.metric-card {
  border: 1px solid var(--line);
  border-radius: 20px;
  padding: 20px;
  background: var(--surface-2);
}

.metric-card span {
  display: block;
  color: var(--muted);
  font-weight: 700;
  margin-bottom: 8px;
}

.metric-card strong {
  font-size: 32px;
}

.sheet-table {
  width: 100%;
  border-collapse: separate;
  border-spacing: 0 10px;
}

.sheet-table th {
  text-align: left;
  color: var(--muted);
  padding: 0 14px 8px;
  font-size: 14px;
}

.sheet-table td {
  padding: 16px 14px;
  background: #fff;
  border-top: 1px solid var(--line);
  border-bottom: 1px solid var(--line);
}

.sheet-table td:first-child {
  border-left: 1px solid var(--line);
  border-radius: 16px 0 0 16px;
  font-weight: 800;
}

.sheet-table td:last-child {
  border-right: 1px solid var(--line);
  border-radius: 0 16px 16px 0;
}

.status-pill {
  display: inline-flex;
  align-items: center;
  border-radius: 999px;
  padding: 6px 10px;
  background: var(--brand-soft);
  color: var(--brand-dark);
  font-weight: 800;
  font-size: 13px;
}

.empty-state {
  border: 1px dashed var(--line-dark);
  border-radius: var(--radius-lg);
  padding: 34px;
  text-align: center;
  color: var(--muted);
  background: #fff;
}


.gantt-panel {
  overflow: hidden;
  border: 1px solid var(--line);
  border-radius: var(--radius-xl);
  background: var(--surface);
  box-shadow: var(--shadow-soft);
}

.gantt-toolbar {
  display: grid;
  grid-template-columns: 1fr auto;
  gap: 18px;
  align-items: center;
  padding: 20px 22px;
  border-bottom: 1px solid var(--line);
  background: linear-gradient(180deg, #fff, var(--surface-2));
}

.gantt-actions,
.gantt-detail-actions {
  display: flex;
  align-items: center;
  gap: 10px;
  flex-wrap: wrap;
}

.gantt-info strong {
  display: block;
  margin-bottom: 4px;
  font-size: 18px;
}

.gantt-info span {
  color: var(--muted);
  font-weight: 650;
}

.ghost-button {
  border: 1px solid var(--line);
  border-radius: 14px;
  padding: 11px 14px;
  background: #fff;
  color: var(--text);
  font-weight: 800;
  transition: 160ms ease;
}

.ghost-button:hover {
  border-color: var(--brand);
  color: var(--brand);
  transform: translateY(-1px);
}

.gantt-board {
  display: grid;
  grid-template-columns: 340px minmax(720px, 1fr);
  min-height: 560px;
}

.gantt-sidebar {
  border-right: 1px solid var(--line);
  background: #fff;
}

.gantt-sidebar-head,
.gantt-task-row {
  display: grid;
  grid-template-columns: 1fr 88px;
  gap: 12px;
  align-items: center;
}

.gantt-sidebar-head {
  position: sticky;
  top: 0;
  z-index: 4;
  min-height: 58px;
  padding: 0 18px;
  border-bottom: 1px solid var(--line);
  background: var(--surface-2);
  color: var(--muted);
  font-size: 13px;
  font-weight: 850;
  text-transform: uppercase;
  letter-spacing: 0.08em;
}

.gantt-task-row {
  min-height: 62px;
  padding: 10px 18px;
  border-bottom: 1px solid var(--line);
  background: #fff;
  transition: 160ms ease;
}

.gantt-task-row:hover,
.gantt-task-row.is-selected {
  background: var(--brand-soft);
}

.gantt-task-title {
  display: block;
  color: var(--text);
  font-weight: 850;
}

.gantt-task-meta {
  display: block;
  margin-top: 5px;
  color: var(--muted);
  font-size: 13px;
  font-weight: 650;
}

.gantt-progress-small {
  justify-self: end;
  min-width: 58px;
  border-radius: 999px;
  padding: 6px 9px;
  background: var(--surface-2);
  border: 1px solid var(--line);
  color: var(--brand-dark);
  text-align: center;
  font-size: 13px;
  font-weight: 900;
}

.gantt-timeline {
  position: relative;
  overflow: auto;
  background: #fff;
}

.gantt-chart {
  position: relative;
  min-width: 900px;
}

.gantt-header-grid,
.gantt-row-grid {
  display: grid;
  grid-auto-flow: column;
  grid-auto-columns: var(--gantt-day-width, 34px);
}

.gantt-header-grid {
  position: sticky;
  top: 0;
  z-index: 5;
  min-height: 58px;
  border-bottom: 1px solid var(--line);
  background: var(--surface-2);
}

.gantt-day-cell {
  display: grid;
  place-items: center;
  border-right: 1px solid var(--line);
  color: var(--muted);
  font-size: 12px;
  font-weight: 800;
}

.gantt-day-cell.is-weekend {
  background: rgba(15, 135, 181, 0.04);
}

.gantt-day-cell.is-month-start {
  box-shadow: inset 2px 0 0 rgba(15, 135, 181, 0.28);
}

.gantt-row-grid {
  position: relative;
  min-height: 62px;
  border-bottom: 1px solid var(--line);
}

.gantt-row-grid .gantt-day-cell {
  color: transparent;
}

.gantt-bar {
  position: absolute;
  top: 14px;
  height: 34px;
  display: flex;
  align-items: center;
  overflow: hidden;
  border: 1px solid rgba(43, 122, 191, 0.34);
  border-radius: 999px;
  background: linear-gradient(180deg, #a9d2f6, #83bae9);
  color: #21364b;
  box-shadow: 0 10px 22px rgba(68, 132, 192, 0.22);
  cursor: grab;
  user-select: none;
  transition: box-shadow 160ms ease, transform 160ms ease;
}

.gantt-bar:active {
  cursor: grabbing;
}

}

.progress-control {

  gap: 7px;
  color: var(--muted);
  font-weight: 800;
}

  accent-color: var(--brand);

.gantt-empty {
  padding: 30px;

  <div id="app" class="app-shell"></div>

    <div class="modal-backdrop" data-modal-close>
      <section class="modal-card" role="dialog" aria-modal="true" aria-labelledby="modal-title">

              <input name="start" type="time" value="09:00" required />

            <textarea name="description" rows="3" placeholder="Kurze Notiz zum Vorgang"></textarea>

  <script>
class EventStore {
  constructor() {
    this.storageKey = 'fixplan-prototype-events';
    this.events = this.loadEvents();
  }

  loadEvents() {
    const stored = window.localStorage.getItem(this.storageKey);
    if (stored) {
      try {
        return JSON.parse(stored);
      } catch (error) {
        console.warn('Gespeicherte FixPlan Daten konnten nicht gelesen werden.', error);
      }
    }

    return [
      { id: 1, title: 'Aufgabentitel 1', date: '2024-04-05', start: '06:55', end: '07:45', description: 'Kurzer Vorgang im Time Log.' },
      { id: 2, title: 'Aufgabentitel 2', date: '2024-04-05', start: '10:00', end: '12:15', description: 'Längerer Arbeitsblock.' },
      { id: 3, title: 'Aufgabentitel 3', date: '2024-04-05', start: '14:00', end: '17:00', description: 'Projektarbeit.' },
      { id: 4, title: 'Planung Review', date: '2024-04-16', start: '10:00', end: '10:45', description: 'Termin aus der Kalenderansicht.' },
      { id: 5, title: 'Team Abstimmung', date: '2024-04-18', start: '13:00', end: '14:00', description: 'Abstimmung im Projektteam.' }
    ];
  }

  persist() {
    window.localStorage.setItem(this.storageKey, JSON.stringify(this.events));
  }

  addEvent(event) {
    const nextId = Math.max(0, ...this.events.map(item => item.id)) + 1;
    const newEvent = { id: nextId, ...event };
    this.events.push(newEvent);
    this.persist();
    return newEvent;
  }

  getEventsForDate(date) {
    return this.events
      .filter(event => event.date === date)
      .sort((a, b) => a.start.localeCompare(b.start));
  }

  getEventsForMonth(year, monthIndex) {
    const prefix = `${year}-${String(monthIndex + 1).padStart(2, '0')}`;
    return this.events.filter(event => event.date.startsWith(prefix));
  }

  search(query) {
    const normalized = query.trim().toLowerCase();
    if (!normalized) return this.events;

    return this.events.filter(event => (
      event.title.toLowerCase().includes(normalized) ||
      event.description.toLowerCase().includes(normalized) ||
      event.date.includes(normalized)
    ));
  }
}


class GanttStore {
  constructor() {
    this.storageKey = 'fixplan-prototype-gantt-tasks';
    this.tasks = this.loadTasks();
  }

  loadTasks() {
    const stored = window.localStorage.getItem(this.storageKey);
    if (stored) {
      try {
        return JSON.parse(stored);
      } catch (error) {
        console.warn('Gespeicherte Gantt Daten konnten nicht gelesen werden.', error);
      }
    }

    return [
      { id: 1, title: 'Projektstart & Analyse', owner: 'Team', start: '2024-04-01', end: '2024-04-05', progress: 100, status: 'Abgeschlossen' },
      { id: 2, title: 'Konzept & Anforderungen', owner: 'Niklas', start: '2024-04-04', end: '2024-04-12', progress: 75, status: 'In Arbeit' },
      { id: 3, title: 'Oberflächen entwerfen', owner: 'Design', start: '2024-04-10', end: '2024-04-18', progress: 55, status: 'In Arbeit' },
      { id: 4, title: 'Prototyp umsetzen', owner: 'Dev', start: '2024-04-17', end: '2024-04-26', progress: 30, status: 'Geplant' },
      { id: 5, title: 'Review & Abnahme', owner: 'Projektleitung', start: '2024-04-25', end: '2024-04-30', progress: 0, status: 'Offen' }
    ];
  }

  persist() {
    window.localStorage.setItem(this.storageKey, JSON.stringify(this.tasks));
  }

  getTasks(query = '') {
    const normalized = query.trim().toLowerCase();
    const result = normalized
      ? this.tasks.filter(task => (
          task.title.toLowerCase().includes(normalized) ||
          task.owner.toLowerCase().includes(normalized) ||
          task.status.toLowerCase().includes(normalized)
        ))
      : this.tasks;

    return [...result].sort((a, b) => a.start.localeCompare(b.start));
  }

  getTask(id) {
    return this.tasks.find(task => task.id === Number(id));
  }

  addTask(task) {
    const nextId = Math.max(0, ...this.tasks.map(item => item.id)) + 1;
    const newTask = { id: nextId, ...task };
    this.tasks.push(newTask);
    this.persist();
    return newTask;
  }

  updateTask(id, changes) {
    const task = this.getTask(id);
    if (!task) return null;
    Object.assign(task, changes);
    this.persist();
    return task;
  }

  deleteTask(id) {
    this.tasks = this.tasks.filter(task => task.id !== Number(id));
    this.persist();
  }
}

class DateService {
  static toISO(date) {
    return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
  }

  static fromISO(value) {
    const [year, month, day] = value.split('-').map(Number);
    return new Date(year, month - 1, day);
  }

  static addDays(date, amount) {
    const copy = new Date(date);
    copy.setDate(copy.getDate() + amount);
    return copy;
  }

  static addMonths(date, amount) {
    const copy = new Date(date);
    copy.setMonth(copy.getMonth() + amount);
    return copy;
  }

  static timeToMinutes(time) {
    const [hours, minutes] = time.split(':').map(Number);
    return (hours * 60) + minutes;
  }

  static minutesToReadable(minutes) {
    const hours = Math.floor(minutes / 60);
    const rest = minutes % 60;
    return `${hours}:${String(rest).padStart(2, '0')} h`;
  }

  static diffDays(startIso, endIso) {
    const start = DateService.fromISO(startIso);
    const end = DateService.fromISO(endIso);
    return Math.round((end - start) / 86400000);
  }

  static addDaysToISO(value, amount) {
    return DateService.toISO(DateService.addDays(DateService.fromISO(value), amount));
  }

  static formatShortDate(value) {
    return DateService.fromISO(value).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' });
  }

  static formatRange(startIso, endIso) {
    return `${DateService.formatShortDate(startIso)} bis ${DateService.formatShortDate(endIso)}`;
  }

  static formatDateChip(date) {
    return date.toLocaleDateString('de-DE', { weekday: 'long', day: 'numeric', month: 'numeric' });
  }

  static formatMonthTitle(date) {
    return date.toLocaleDateString('de-DE', { month: 'long', year: 'numeric' });
  }
}

class TimeLogView extends Component {
  constructor(app) {
    super(app);
    this.visibleStart = 6 * 60;
    this.visibleEnd = 18 * 60;
    this.slotHeight = 56;
  }

  render() {
    const dateIso = DateService.toISO(this.app.selectedDate);
    const allEvents = this.app.store.getEventsForDate(dateIso);
    const events = this.filterEvents(allEvents);
    const totalMinutes = allEvents.reduce((sum, event) => sum + this.duration(event), 0);

    const view = this.htmlToElement(`
      <main class="content">
        <section class="view-header">
          <div class="title-block">
            <h1>Time Log</h1>
            <p>Tagesgenaue Erfassung von Aufgaben und Arbeitszeiten.</p>
          </div>
          <div class="segmented" aria-label="Ansicht wechseln">
            <button class="is-active" type="button">Tag</button>
            <button type="button">Woche</button>
            <button type="button">Meine Zeiten</button>
          </div>
          <div class="date-switcher">
            <button class="icon-button" type="button" data-prev-day aria-label="Vorheriger Tag">‹</button>
            <div class="date-chip">${DateService.formatDateChip(this.app.selectedDate)}</div>
            <button class="icon-button" type="button" data-next-day aria-label="Nächster Tag">›</button>
          </div>
        </section>
        <section class="timelog-grid">
          <aside class="summary-panel"></aside>
          <section class="timeline-panel">
            <div class="timeline-hours"></div>
            <div class="timeline-canvas"></div>
          </section>
        </section>
      </main>
    `);

    view.querySelector('[data-prev-day]').addEventListener('click', () => this.app.changeSelectedDate(-1));
    view.querySelector('[data-next-day]').addEventListener('click', () => this.app.changeSelectedDate(1));
    view.querySelector('.summary-panel').append(this.renderSummary(allEvents, totalMinutes));
    this.renderHours(view.querySelector('.timeline-hours'));
    this.renderTimeline(view.querySelector('.timeline-canvas'), events);
    return view;
  }

  filterEvents(events) {
    const query = this.app.searchQuery.trim().toLowerCase();
    if (!query) return events;
    return events.filter(event => event.title.toLowerCase().includes(query) || event.description.toLowerCase().includes(query));
  }

  renderSummary(events, totalMinutes) {
    const wrapper = this.htmlToElement(`
      <div>
        <div class="donut-card">
          <div class="donut">
            <div class="donut-label">
              <div>
                <span>${DateService.minutesToReadable(totalMinutes).replace(' h', '')}</span>
                <span>${this.app.selectedDate.getDate()}.${this.app.selectedDate.getMonth() + 1}</span>
              </div>
            </div>
          </div>
        </div>
        <div class="task-list"></div>
      </div>
    `);

    const list = wrapper.querySelector('.task-list');
    if (events.length === 0) {
      list.append(this.htmlToElement(`<div class="empty-state">Noch keine Zeiten für diesen Tag erfasst.</div>`));
      return wrapper;
    }

    events.forEach(event => {
      list.append(this.htmlToElement(`
        <div class="task-summary-row">
          <strong>${event.title}</strong>
          <span>${DateService.minutesToReadable(this.duration(event))}</span>
        </div>
      `));
    });

    return wrapper;
  }

  renderHours(container) {
    for (let hour = 6; hour <= 18; hour += 1) {
      const top = ((hour * 60 - this.visibleStart) / 60) * this.slotHeight;
      const label = this.htmlToElement(`<div class="hour-label" style="top:${top}px">${hour}:00</div>`);
      container.append(label);
    }
  }

  renderTimeline(container, events) {
    const canvasHeight = ((this.visibleEnd - this.visibleStart) / 60) * this.slotHeight;
    container.style.minHeight = `${canvasHeight}px`;

    const addButton = this.htmlToElement(`<button class="timeline-add" type="button" aria-label="Eintrag hinzufügen">+</button>`);
    addButton.addEventListener('click', () => this.app.openModal());
    container.append(addButton);

    if (events.length === 0 && this.app.searchQuery) {
      container.append(this.htmlToElement(`<div class="empty-state" style="position:absolute; left:20px; right:20px; top:270px;">Keine passenden Time Log Einträge gefunden.</div>`));
      return;
    }

    events.forEach(event => {
      const start = DateService.timeToMinutes(event.start);
      const end = DateService.timeToMinutes(event.end);
      const top = Math.max(0, ((start - this.visibleStart) / 60) * this.slotHeight);
      const height = Math.max(42, ((end - start) / 60) * this.slotHeight);

      const entry = this.htmlToElement(`
        <article class="time-entry" style="top:${top}px; height:${height}px">
          <div>
            <div class="time-entry-title">${event.title}</div>
            <div class="time-entry-time">${event.start} bis ${event.end}</div>
          </div>
          <div class="time-entry-handle" aria-hidden="true"></div>
        </article>
      `);
      container.append(entry);
    });
  }

  duration(event) {
    return DateService.timeToMinutes(event.end) - DateService.timeToMinutes(event.start);
  }
}

class CalendarView extends Component {
  constructor(app) {
    super(app);
    this.weekdays = ['Montag', 'Dienstag', 'Mittwoch', 'Donnerstag', 'Freitag', 'Samstag', 'Sonntag'];
  }

  render() {
    const view = this.htmlToElement(`
      <main class="content">
        <section class="view-header">
          <div class="title-block">
            <h1>Kalender</h1>
            <p>${DateService.formatMonthTitle(this.app.calendarDate)} im Projektüberblick.</p>
          </div>
          <div class="calendar-tools">
            <button class="icon-button" type="button" data-prev-month aria-label="Vorheriger Monat">‹</button>
            <button class="icon-button" type="button" data-next-month aria-label="Nächster Monat">›</button>
          </div>
          <div class="segmented" aria-label="Kalenderansicht wechseln">
            <button type="button">Woche</button>
            <button class="is-active" type="button">Monat</button>
            <button type="button">Jahr</button>
          </div>
        </section>
        <section class="calendar-panel">
          <div class="calendar-grid"></div>
        </section>
      </main>
    `);

    view.querySelector('[data-prev-month]').addEventListener('click', () => this.app.changeCalendarMonth(-1));
    view.querySelector('[data-next-month]').addEventListener('click', () => this.app.changeCalendarMonth(1));
    this.renderGrid(view.querySelector('.calendar-grid'));
    return view;
  }

  renderGrid(container) {
    this.weekdays.forEach(day => container.append(this.htmlToElement(`<div class="weekday">${day}</div>`)));

    const year = this.app.calendarDate.getFullYear();
    const month = this.app.calendarDate.getMonth();
    const firstOfMonth = new Date(year, month, 1);
    const startOffset = (firstOfMonth.getDay() + 6) % 7;
    const gridStart = new Date(year, month, 1 - startOffset);

    for (let index = 0; index < 35; index += 1) {
      const date = new Date(gridStart);
      date.setDate(gridStart.getDate() + index);
      container.append(this.renderDay(date, month));
    }
  }

  renderDay(date, visibleMonth) {
    const dateIso = DateService.toISO(date);
    const events = this.filterEvents(this.app.store.getEventsForDate(dateIso));
    const isMuted = date.getMonth() !== visibleMonth;
    const isToday = dateIso === DateService.toISO(this.app.selectedDate);

    const day = this.htmlToElement(`
      <article class="calendar-day ${isMuted ? 'is-muted' : ''} ${isToday ? 'is-today' : ''}">
        <div class="day-number">${String(date.getDate()).padStart(2, '0')}</div>
      </article>
    `);

    events.slice(0, 3).forEach(event => {
      day.append(this.htmlToElement(`<div class="calendar-entry">${event.start} ${event.title}</div>`));
    });

    if (events.length > 3) {
      day.append(this.htmlToElement(`<div class="calendar-entry">+ ${events.length - 3} weitere</div>`));
    }

    const add = this.htmlToElement(`<button class="calendar-add-line" type="button">+</button>`);
    add.addEventListener('click', event => {
      event.stopPropagation();
      this.app.selectedDate = DateService.fromISO(dateIso);
      this.app.openModal(dateIso);
    });

    if (!isMuted && date.getDate() === 16) {
      day.append(add);
    }

    day.addEventListener('dblclick', () => {
      this.app.selectedDate = DateService.fromISO(dateIso);
      this.app.setView('timelog');
    });

    return day;
  }

  filterEvents(events) {
    const query = this.app.searchQuery.trim().toLowerCase();
    if (!query) return events;
    return events.filter(event => event.title.toLowerCase().includes(query) || event.description.toLowerCase().includes(query));
  }
}

            </thead>
            <tbody></tbody>
          </table>
        </section>
      </main>
    `);

    const tbody = view.querySelector('tbody');
    searchedEvents
      .sort((a, b) => `${a.date}${a.start}`.localeCompare(`${b.date}${b.start}`))
      .forEach(event => {
        const date = DateService.fromISO(event.date).toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit', year: 'numeric' });
        tbody.append(this.htmlToElement(`
          <tr>
            <td>${date}</td>
            <td>${event.title}</td>
            <td>${event.start} bis ${event.end}</td>
            <td>${DateService.minutesToReadable(this.duration(event))}</td>
            <td><span class="status-pill">Erfasst</span></td>
          </tr>
        `));
      });

    if (searchedEvents.length === 0) {
      tbody.append(this.htmlToElement(`
        <tr>
          <td colspan="5">Keine passenden Time Sheet Einträge gefunden.</td>
        </tr>
      `));
    }

    return view;
  }

  duration(event) {
    return DateService.timeToMinutes(event.end) - DateService.timeToMinutes(event.start);
  }
}


class GanttView extends Component {
  constructor(app) {
    super(app);
    this.rowHeight = 62;
    this.zoomMap = {
      kompakt: 24,
      standard: 34,
      detail: 48
    };
  }

  render() {
    const tasks = this.app.ganttStore.getTasks(this.app.searchQuery);
    const selectedTask = this.ensureSelection(tasks);
    const range = this.getRange(tasks.length ? tasks : this.app.ganttStore.getTasks(''));
    const dayWidth = this.zoomMap[this.app.ganttZoom] || this.zoomMap.standard;
    const dayCount = DateService.diffDays(range.start, range.end) + 1;
    const duration = tasks.reduce((sum, task) => sum + DateService.diffDays(task.start, task.end) + 1, 0);

    const view = this.htmlToElement(`
      <main class="content">
        <section class="view-header">
          <div class="title-block">
            <h1>Gantt Chart</h1>
            <p>Klassische Projektplanung mit Zeitachse, Aufgabenbalken und Fortschritt.</p>
          </div>
          <div class="segmented" aria-label="Zoom für Gantt Chart wechseln">
            <button class="${this.app.ganttZoom === 'kompakt' ? 'is-active' : ''}" type="button" data-zoom="kompakt">Kompakt</button>
            <button class="${this.app.ganttZoom === 'standard' ? 'is-active' : ''}" type="button" data-zoom="standard">Standard</button>
            <button class="${this.app.ganttZoom === 'detail' ? 'is-active' : ''}" type="button" data-zoom="detail">Detail</button>
          </div>
        </section>
        <section class="gantt-panel">
          <div class="gantt-toolbar">
            <div class="gantt-info">
              <strong>${tasks.length} Aufgaben im Plan</strong>
              <span>${dayCount} Tage Zeitachse · ${duration} geplante Aufgabentage</span>
            </div>
            <div class="gantt-actions">
              <button class="ghost-button" type="button" data-add-gantt>+ Aufgabe hinzufügen</button>
              <button class="ghost-button" type="button" data-reset-gantt>Beispielplan zurücksetzen</button>
            </div>
          </div>
          <div class="gantt-board" style="--gantt-day-width:${dayWidth}px">
            <aside class="gantt-sidebar">
              <div class="gantt-sidebar-head">
                <span>Aufgabe</span>
                <span>Fortschritt</span>
              </div>
              <div class="gantt-task-list"></div>
            </aside>
            <div class="gantt-timeline">
              <div class="gantt-chart" style="width:${Math.max(900, dayCount * dayWidth)}px">
                <div class="gantt-header-grid"></div>
                <div class="gantt-rows"></div>
              </div>
            </div>
          </div>
          <div class="gantt-detail-panel"></div>
        </section>
      </main>
    `);

    view.querySelectorAll('[data-zoom]').forEach(button => {
      button.addEventListener('click', () => {
        this.app.ganttZoom = button.dataset.zoom;
        this.app.render();
      });
    });

    view.querySelector('[data-add-gantt]').addEventListener('click', () => this.addTask());
    view.querySelector('[data-reset-gantt]').addEventListener('click', () => this.resetTasks());

    this.renderTaskList(view.querySelector('.gantt-task-list'), tasks);
    this.renderTimeline(view, tasks, range, dayWidth, dayCount);
    this.renderDetail(view.querySelector('.gantt-detail-panel'), selectedTask);
    return view;
  }

  ensureSelection(tasks) {
    if (!tasks.length) {
      this.app.selectedGanttTaskId = null;
      return null;
    }

    const selectedStillVisible = tasks.some(task => task.id === this.app.selectedGanttTaskId);
    if (!selectedStillVisible) this.app.selectedGanttTaskId = tasks[0].id;
    return this.app.ganttStore.getTask(this.app.selectedGanttTaskId);
  }

  getRange(tasks) {
    const starts = tasks.map(task => task.start).sort();
    const ends = tasks.map(task => task.end).sort();
    const start = starts[0] || '2024-04-01';
    const end = ends[ends.length - 1] || '2024-04-30';
    return {
      start: DateService.addDaysToISO(start, -2),
      end: DateService.addDaysToISO(end, 4)
    };
  }

  renderTaskList(container, tasks) {
    if (!tasks.length) {
      container.append(this.htmlToElement(`<div class="gantt-empty">Keine passenden Gantt Aufgaben gefunden.</div>`));
      return;
    }

    tasks.forEach(task => {
      const row = this.htmlToElement(`
        <button class="gantt-task-row ${task.id === this.app.selectedGanttTaskId ? 'is-selected' : ''}" type="button">
          <span>
            <span class="gantt-task-title">${task.title}</span>
            <span class="gantt-task-meta">${task.owner} · ${DateService.formatRange(task.start, task.end)}</span>
          </span>
          <span class="gantt-progress-small">${task.progress}%</span>
        </button>
      `);
      row.addEventListener('click', () => this.selectTask(task.id));
      container.append(row);
    });
  }

  renderTimeline(view, tasks, range, dayWidth, dayCount) {
    const header = view.querySelector('.gantt-header-grid');
    const rows = view.querySelector('.gantt-rows');
    const chart = view.querySelector('.gantt-chart');

    for (let index = 0; index < dayCount; index += 1) {
      const dateIso = DateService.addDaysToISO(range.start, index);
      const date = DateService.fromISO(dateIso);
      const weekday = date.getDay();
      const isWeekend = weekday === 0 || weekday === 6;
      const isMonthStart = date.getDate() === 1;
      header.append(this.htmlToElement(`
        <div class="gantt-day-cell ${isWeekend ? 'is-weekend' : ''} ${isMonthStart ? 'is-month-start' : ''}">
          ${date.toLocaleDateString('de-DE', { day: '2-digit', month: '2-digit' })}
        </div>
      `));
    }

    tasks.forEach(task => {
      const row = this.htmlToElement(`<div class="gantt-row-grid"></div>`);
      for (let index = 0; index < dayCount; index += 1) {
        const date = DateService.fromISO(DateService.addDaysToISO(range.start, index));
        const weekday = date.getDay();
        row.append(this.htmlToElement(`<div class="gantt-day-cell ${weekday === 0 || weekday === 6 ? 'is-weekend' : ''}">.</div>`));
      }

      const left = DateService.diffDays(range.start, task.start) * dayWidth;
      const width = (DateService.diffDays(task.start, task.end) + 1) * dayWidth;
      const bar = this.htmlToElement(`
        <article class="gantt-bar ${task.id === this.app.selectedGanttTaskId ? 'is-selected' : ''}" style="left:${left}px; width:${width}px; --progress:${task.progress}%" data-task-id="${task.id}">
          <span class="gantt-bar-progress"></span>
          <span class="gantt-resize-handle left" data-resize="left"></span>
          <span class="gantt-bar-label">${task.title}</span>
          <span class="gantt-resize-handle right" data-resize="right"></span>
        </article>
      `);
      this.bindBarInteraction(bar, task, range, dayWidth);
      row.append(bar);
      rows.append(row);
    });

    const todayIso = '2024-04-16';
    if (todayIso >= range.start && todayIso <= range.end) {
      const todayLeft = DateService.diffDays(range.start, todayIso) * dayWidth;
      chart.append(this.htmlToElement(`<div class="gantt-today-line" style="left:${todayLeft}px"></div>`));
    }
  }

  renderDetail(container, task) {
    if (!task) {
      container.append(this.htmlToElement(`<div class="gantt-empty">Wähle eine Aufgabe aus oder lege eine neue Aufgabe an.</div>`));
      return;
    }

    container.innerHTML = `
      <div>
        <span class="gantt-detail-title">${task.title}</span>
        <span class="gantt-detail-meta">${task.status} · ${task.owner} · ${DateService.formatRange(task.start, task.end)}</span>
      </div>
      <label class="progress-control">
        Fortschritt: <span>${task.progress}%</span>
        <input type="range" min="0" max="100" step="5" value="${task.progress}" data-progress-slider />
      </label>
      <div class="gantt-detail-actions">
        <button class="ghost-button" type="button" data-move-left>← 1 Tag</button>
        <button class="ghost-button" type="button" data-move-right>1 Tag →</button>
        <button class="ghost-button" type="button" data-delete-task>Löschen</button>
      </div>
    `;

    container.querySelector('[data-progress-slider]').addEventListener('input', event => {
      this.app.ganttStore.updateTask(task.id, { progress: Number(event.target.value) });
      this.app.renderContentOnly();
    });
    container.querySelector('[data-move-left]').addEventListener('click', () => this.moveTask(task.id, -1));
    container.querySelector('[data-move-right]').addEventListener('click', () => this.moveTask(task.id, 1));
    container.querySelector('[data-delete-task]').addEventListener('click', () => {
      this.app.ganttStore.deleteTask(task.id);
      this.app.selectedGanttTaskId = null;
      this.app.render();
    });
  }

  bindBarInteraction(bar, task, range, dayWidth) {
    let interaction = null;

    bar.addEventListener('pointerdown', event => {
      const resize = event.target.dataset.resize || null;
      interaction = {
        taskId: task.id,
        startX: event.clientX,
        originalStart: task.start,
        originalEnd: task.end,
        mode: resize || 'move'
      };
      bar.setPointerCapture(event.pointerId);
      this.selectTask(task.id, false);
    });

    bar.addEventListener('pointermove', event => {
      if (!interaction) return;
      const deltaDays = Math.round((event.clientX - interaction.startX) / dayWidth);
      if (deltaDays === 0) return;

      let nextStart = interaction.originalStart;
      let nextEnd = interaction.originalEnd;
      if (interaction.mode === 'move') {
        nextStart = DateService.addDaysToISO(interaction.originalStart, deltaDays);
        nextEnd = DateService.addDaysToISO(interaction.originalEnd, deltaDays);
      }
      if (interaction.mode === 'left') {
        nextStart = DateService.addDaysToISO(interaction.originalStart, deltaDays);
        if (nextStart > nextEnd) nextStart = nextEnd;
      }
      if (interaction.mode === 'right') {
        nextEnd = DateService.addDaysToISO(interaction.originalEnd, deltaDays);
        if (nextEnd < nextStart) nextEnd = nextStart;
      }
      this.app.ganttStore.updateTask(task.id, { start: nextStart, end: nextEnd });
      this.app.renderContentOnly();
    });

    bar.addEventListener('pointerup', () => { interaction = null; });
    bar.addEventListener('click', event => {
      event.stopPropagation();
      this.selectTask(task.id);
    });
  }

  addTask() {
    const allTasks = this.app.ganttStore.getTasks('');
    const last = allTasks[allTasks.length - 1];
    const start = last ? DateService.addDaysToISO(last.end, 1) : '2024-04-01';
    const end = DateService.addDaysToISO(start, 4);
    const task = this.app.ganttStore.addTask({
      title: `Neue Aufgabe ${allTasks.length + 1}`,
      owner: 'Team',
      start,
      end,
      progress: 0,
      status: 'Offen'
    });
    this.app.selectedGanttTaskId = task.id;
    this.app.render();
  }

  resetTasks() {
    window.localStorage.removeItem(this.app.ganttStore.storageKey);
    this.app.ganttStore = new GanttStore();
    this.app.selectedGanttTaskId = this.app.ganttStore.tasks[0]?.id || null;
    this.app.render();
  }

  selectTask(id, rerender = true) {
    this.app.selectedGanttTaskId = Number(id);
    if (rerender) this.app.renderContentOnly();
  }

  moveTask(id, days) {
    const task = this.app.ganttStore.getTask(id);
    if (!task) return;
    this.app.ganttStore.updateTask(id, {
      start: DateService.addDaysToISO(task.start, days),
      end: DateService.addDaysToISO(task.end, days)
    });
    this.app.renderContentOnly();
  }
}

      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;');
  }

      return `
        <div class="rail-gantt-label">${this.escape(task.title.split(' ').slice(0, 2).join(' '))}</div>

        <div class="rail-bar-cell ${startCol === 4 ? classes[index] : ''}">${startCol === 4 ? '<span></span>' : ''}</div>

      `;
    }).join('');
    return `<div class="rail-gantt-grid">${header}${rows}</div>`;
  }

  statusClass(status) {
    const key = String(status).toLowerCase().replaceAll(' ', '-');
    if (key === 'in-arbeit') return 'is-in-arbeit';
    return `is-${key}`;
  }

  formatDate(value) {
    return DateService.fromISO(value).toLocaleDateString('de-DE');
  }

  escape(value) {
    return String(value)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;');
  }
}

  renderDateHeader(days) {
    return `
      <div class="resource-grid-row resource-date-row">
        <div class="resource-row-label">Ressourcen</div>
        ${days.map(day => `<div class="resource-date-label ${day.isWeekend ? 'is-weekend' : ''}" title="${day.weekday}">${day.label}</div>`).join('')}
      </div>
    `;
  }

  renderResourceGroup(row, days) {
    const capacity = this.getCapacityValues(row, days);
    return `
      <section class="resource-group">
        <div class="resource-group-title">
          ${this.escape(row.name)}
        </div>
        <div class="resource-grid-row">
          <div class="resource-row-label">${row.isUnassigned ? 'Bedarf ohne Ressource' : 'Verbleibende Kapazität'}</div>
          ${capacity.map((value, index) => `
            <div class="resource-grid-cell ${days[index].isWeekend ? 'is-weekend' : ''} ${value < 0 ? 'is-negative' : ''}">${value}</div>
          `).join('')}
        </div>
        <div class="resource-task-row">
          <div class="resource-row-label">Aufgaben</div>
          <div class="resource-task-grid">
            ${days.map(day => `<div class="resource-task-bg ${day.isWeekend ? 'is-weekend' : ''}"></div>`).join('')}
          </div>
          <div class="resource-task-bars">
            ${row.assignments.map(task => this.renderAssignmentBar(task)).join('')}
          </div>
        </div>
      </section>
    `;
  }

  renderAssignmentBar(task) {
    return `
      <div class="resource-task-bar is-${task.color}" style="grid-column:${task.start + 1} / span ${task.duration}; grid-row:${task.lane + 1};" title="${this.escape(task.label)}">
        ${this.escape(task.label)}
      </div>
    `;
  }

  getCapacityValues(row, days) {
    return days.map(day => {
      const load = row.assignments
        .filter(task => day.index >= task.start && day.index < task.start + task.duration)
        .reduce((total, task) => total + task.planned, 0);
      if (row.isUnassigned) return load;
      return row.baseCapacity - load;
    });
  }

  getSummary(rows, days) {
    const assignedRows = rows.filter(row => !row.isUnassigned);
    const unassigned = rows.find(row => row.isUnassigned);
    const overloadedDays = assignedRows.reduce((total, row) => {
      return total + this.getCapacityValues(row, days).filter(value => value < 0).length;
    }, 0);
    const unassignedDemand = unassigned
      ? this.getCapacityValues(unassigned, days).reduce((total, value) => total + value, 0)
      : 0;
    return {
      resources: assignedRows.length,
      assignments: rows.reduce((total, row) => total + row.assignments.length, 0),
      overloadedDays,
      unassignedDemand
    };
  }

  escape(value) {
    return String(value)
      .replaceAll('&', '&amp;')
      .replaceAll('<', '&lt;')
      .replaceAll('>', '&gt;')
      .replaceAll('"', '&quot;');
  }
}

class Modal extends Component {
  open(dateIso = DateService.toISO(this.app.selectedDate)) {
    const template = document.querySelector('#modal-template');
    this.element = template.content.firstElementChild.cloneNode(true);
    this.form = this.element.querySelector('#entry-form');
    this.dateIso = dateIso;

    this.element.addEventListener('click', event => {
      if (event.target.matches('[data-modal-close]')) this.close();
    });

    this.form.addEventListener('submit', event => this.handleSubmit(event));
    document.body.append(this.element);
    this.form.elements.title.focus();
  }

  handleSubmit(event) {
    event.preventDefault();
    const data = new FormData(this.form);
    this.app.store.addEvent({
      title: data.get('title').toString().trim(),
      date: this.dateIso,
      start: data.get('start').toString(),
      end: data.get('end').toString(),
      description: data.get('description').toString().trim()
    });
    this.close();
    this.app.render();
  }

  close() {
    if (this.element) this.element.remove();
    this.element = null;
  }
}

class FixPlanApp {
  constructor(root) {
    this.root = root;
    this.store = new EventStore();
    this.ganttStore = new GanttStore();
    this.notesStore = new NotesStore();
    this.projectStore = new DemoProjectStore();
    this.currentArea = 'project';
    this.currentView = 'gantt';
    this.searchQuery = '';
    this.selectedDate = new Date(2024, 3, 5);
    this.calendarDate = new Date(2024, 3, 1);
    this.ganttZoom = 'standard';
    this.selectedGanttTaskId = this.ganttStore.tasks[0]?.id || null;
    this.selectedProjectTaskId = this.projectStore.getAssignedTasks()[0]?.id || null;
    this.projectWidgetsOpen = true;
    this.modal = new Modal(this);
  }

  start() {
    this.render();
  }

  isPersonalSection() {
    return this.currentArea === 'personal';
  }

  setView(view) {
    const personalViews = ['workspace', 'timesheet', 'timelog', 'calendar', 'profile'];
    if (personalViews.includes(view)) {
      this.setPersonalView(view);
      return;
    }

    this.setProjectView(view);
  }

  setPersonalView(view) {
    this.currentArea = 'personal';
    this.currentView = view;
    this.render();
  }

  setProjectView(view) {
    this.currentArea = 'project';
    this.currentView = view;
    this.render();
  }

  openPersonalWorkspace() {
    this.setPersonalView('workspace');
  }

  openTaskDetail(taskId) {
    this.selectedProjectTaskId = Number(taskId);
    this.currentArea = 'project';
    this.currentView = 'task-detail';
    this.render();
  }

  toggleProjectWidgets() {
    this.projectWidgetsOpen = !this.projectWidgetsOpen;
    this.renderContentOnly();
  }

  setSearchQuery(query) {
    this.searchQuery = query;
    this.renderContentOnly();
  }

  changeSelectedDate(amount) {
    this.selectedDate = DateService.addDays(this.selectedDate, amount);
    this.calendarDate = new Date(this.selectedDate.getFullYear(), this.selectedDate.getMonth(), 1);
    this.render();
  }

  changeCalendarMonth(amount) {
    this.calendarDate = DateService.addMonths(this.calendarDate, amount);
    this.render();
  }

  openModal(dateIso) {
    this.modal.open(dateIso);
  }

  render() {
    this.root.innerHTML = '';
    this.root.append(new Sidebar(this).render());

    const mainArea = document.createElement('div');
    mainArea.className = 'main-area';
    mainArea.append(new TopBar(this).render());
    mainArea.append(this.createView());
    this.root.append(mainArea);
  }

  renderContentOnly() {
    const content = this.root.querySelector('.content');
    if (!content) {
      this.render();
      return;
    }

    const newContent = this.createView();
    content.replaceWith(newContent);

    const topInput = this.root.querySelector('.search-field input');
    if (topInput) {
      topInput.value = this.searchQuery;
      topInput.focus();
      topInput.setSelectionRange(this.searchQuery.length, this.searchQuery.length);
    }
  }

  createView() {
    if (this.currentArea === 'personal') {
      if (this.currentView === 'workspace') return new WorkspaceView(this).render();
      if (this.currentView === 'calendar') return new CalendarView(this).render();
      if (this.currentView === 'timesheet') return new TimeSheetView(this).render();
      if (this.currentView === 'profile') return new ProfileView(this).render();
      return new TimeLogView(this).render();
    }

    if (this.currentView === 'projects') return new ProjectListView(this).render();
    if (this.currentView === 'tasks') return new TaskListProjectView(this).render();
    if (this.currentView === 'task-detail') return new TaskDetailView(this).render();
    if (this.currentView === 'gantt') return new GanttView(this).render();
    if (this.currentView === 'resources') return new ResourcePlanView(this).render();
    if (this.currentView === 'pipeline') return new PipelineView(this).render();
    return new TaskListProjectView(this).render();
  }
}

window.addEventListener('DOMContentLoaded', () => {
  const root = document.querySelector('#app');
  new FixPlanApp(root).start();
});

  </script>
</body>
</html>
